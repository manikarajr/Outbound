@if (visible()) {
  <div
    class="fixed inset-0 z-[9999] flex flex-col items-center justify-center overflow-hidden transition-opacity duration-700"
    [class.opacity-0]="fading()"
    [class.pointer-events-none]="fading()"
    style="background: radial-gradient(ellipse 80% 70% at 50% 60%, #0f1f0a 0%, #080d05 55%, #020302 100%);"
  >

    <!-- Background ambient orbs -->
    <div class="absolute inset-0 pointer-events-none">
      <!-- Top-left orb -->
      <div
        class="absolute -top-24 -left-24 w-80 h-80 rounded-full opacity-20"
        style="background: radial-gradient(circle, #7AAD5C 0%, transparent 70%);
               animation: splash-float 5s ease-in-out infinite;"
      ></div>
      <!-- Bottom-right orb -->
      <div
        class="absolute -bottom-32 -right-20 w-96 h-96 rounded-full opacity-15"
        style="background: radial-gradient(circle, #4a7a2e 0%, transparent 70%);
               animation: splash-float 6s ease-in-out infinite 1s;"
      ></div>
      <!-- Center subtle glow -->
      <div
        class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] rounded-full opacity-10"
        style="background: radial-gradient(circle, #7AAD5C 0%, transparent 65%);"
      ></div>
    </div>

    <!-- Grid texture overlay -->
    <div
      class="absolute inset-0 opacity-[0.03] pointer-events-none"
      style="background-image: linear-gradient(rgba(122,173,92,1) 1px, transparent 1px),
                               linear-gradient(90deg, rgba(122,173,92,1) 1px, transparent 1px);
             background-size: 48px 48px;"
    ></div>

    <!-- Main content -->
    <div class="relative z-10 flex flex-col items-center gap-6">

      <!-- Logo container with animated rings -->
      <div class="relative flex items-center justify-center" style="animation: splash-up 0.8s cubic-bezier(0.16,1,0.3,1) forwards;">
        <!-- Expanding ring 1 -->
        <div
          class="absolute w-36 h-36 rounded-full border border-[#7AAD5C]/30"
          style="animation: splash-ring 2.2s ease-out infinite 0.2s;"
        ></div>
        <!-- Expanding ring 2 -->
        <div
          class="absolute w-36 h-36 rounded-full border border-[#7AAD5C]/20"
          style="animation: splash-ring 2.2s ease-out infinite 0.8s;"
        ></div>

        <!-- Logo badge -->
        <div
          class="relative w-28 h-28 rounded-full flex items-center justify-center"
          style="background: linear-gradient(145deg, #1a2d0f 0%, #0f1a08 100%);
                 border: 1px solid rgba(122,173,92,0.35);
                 animation: splash-glow 2.5s ease-in-out infinite;"
        >
          <!-- Inner ring -->
          <div class="absolute inset-2 rounded-full border border-[#7AAD5C]/15"></div>
          <img src="out1.png" alt="Outbound" class="h-16 w-auto relative z-10 drop-shadow-lg" />
        </div>
      </div>

      <!-- Brand name -->
      <div style="animation: splash-up 0.9s cubic-bezier(0.16,1,0.3,1) 0.15s both;">
        <h1
          class="text-3xl font-light tracking-[0.25em] uppercase"
          style="background: linear-gradient(90deg, #b8d9a0 0%, #7AAD5C 40%, #c8e8b0 60%, #7AAD5C 100%);
                 background-size: 200% auto;
                 -webkit-background-clip: text;
                 background-clip: text;
                 -webkit-text-fill-color: transparent;
                 animation: splash-shimmer 2.5s linear infinite;"
        >Outbound</h1>
      </div>

      <!-- Tagline -->
      <div style="animation: splash-up 1s cubic-bezier(0.16,1,0.3,1) 0.3s both;">
        <p class="text-white/40 tracking-[0.35em] uppercase text-[11px] font-light">
          Travel &nbsp;&bull;&nbsp; Experiences &nbsp;&bull;&nbsp; Memories
        </p>
      </div>

      <!-- Decorative divider -->
      <div class="flex items-center gap-3" style="animation: splash-up 1s cubic-bezier(0.16,1,0.3,1) 0.4s both;">
        <div class="w-10 h-px bg-gradient-to-r from-transparent to-[#7AAD5C]/50"></div>
        <div class="w-1.5 h-1.5 rounded-full bg-[#7AAD5C]/60"></div>
        <div class="w-10 h-px bg-gradient-to-l from-transparent to-[#7AAD5C]/50"></div>
      </div>

      <!-- Loading bar -->
      <div class="mt-2 w-48 h-[2px] bg-white/8 rounded-full overflow-hidden" style="animation: splash-up 1s 0.5s both;">
        <div
          class="h-full rounded-full animate-[load_2s_ease-in-out_forwards]"
          style="background: linear-gradient(90deg, #4a7a2e 0%, #7AAD5C 50%, #a8d080 100%);"
        ></div>
      </div>

      <!-- Loading label -->
      <p class="text-white/25 text-[10px] tracking-[0.2em] uppercase -mt-2" style="animation: splash-up 1s 0.6s both;">
        Loading your journey…
      </p>

    </div>

    <!-- Corner accents -->
    <div class="absolute top-6 left-6 w-8 h-8 border-t border-l border-[#7AAD5C]/25 rounded-tl-lg pointer-events-none"></div>
    <div class="absolute top-6 right-6 w-8 h-8 border-t border-r border-[#7AAD5C]/25 rounded-tr-lg pointer-events-none"></div>
    <div class="absolute bottom-6 left-6 w-8 h-8 border-b border-l border-[#7AAD5C]/25 rounded-bl-lg pointer-events-none"></div>
    <div class="absolute bottom-6 right-6 w-8 h-8 border-b border-r border-[#7AAD5C]/25 rounded-br-lg pointer-events-none"></div>

  </div>
}
