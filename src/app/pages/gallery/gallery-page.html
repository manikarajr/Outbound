<section class="min-h-screen pt-24 pb-16 px-6 lg:px-12 max-w-[1440px] mx-auto">

  <!-- Header -->
  <div class="text-center mb-12">
    <p class="text-xs font-extrabold tracking-[0.3em] uppercase text-pista mb-3">Our Gallery</p>
    <h1 class="text-4xl lg:text-5xl font-bold text-gray-900 leading-tight">Moments We've Captured</h1>
    <p class="mt-4 text-gray-500 text-base max-w-xl mx-auto">
      A glimpse into the beautiful destinations and unforgettable experiences we've crafted for our travelers.
    </p>
  </div>

  <!-- Grid -->
  <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
    <div *ngFor="let img of images"
      class="group relative rounded-2xl overflow-hidden aspect-square cursor-pointer shadow-md hover:shadow-xl transition-shadow duration-300">
      <img [src]="img.src" [alt]="img.label"
        class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" />
      <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
      <div class="absolute bottom-0 left-0 right-0 p-4 translate-y-2 opacity-0 group-hover:translate-y-0 group-hover:opacity-100 transition-all duration-300">
        <p class="text-white font-bold text-sm">{{ img.label }}</p>
      </div>
    </div>
  </div>

</section>
