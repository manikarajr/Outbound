<!-- ╔══════════════════════════════════════════════════
     INTERNATIONAL PACKAGES
═══════════════════════════════════════════════════╗ -->
<section id="packages" class="py-24" style="background: linear-gradient(180deg, #f8faf5 0%, #ffffff 100%);">
  <div class="max-w-[1400px] mx-auto px-6 lg:px-10">

    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-end justify-between mb-12 gap-4">
      <div>
        <span class="section-label">Curated For You</span>
        <h2 class="section-title">International <em>Packages</em></h2>
      </div>
      <a href="#" class="text-sm font-body font-medium hover:underline underline-offset-2 transition-colors shrink-0"
        style="color:#7AAD5C;">
        See All Packages →
      </a>
    </div>

    <!-- Cards Grid -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-7">
      <div *ngFor="let pkg of packages; let i = index" class="pkg-card" [style.animation-delay]="(i * 0.1) + 's'">
        <!-- Image -->
        <div class="relative h-56 overflow-hidden">
          <img [src]="pkg.img" [alt]="pkg.title"
            class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" />
          <!-- Badge -->
          <span
            class="absolute top-4 left-4 px-3 py-1 text-[10px] font-body font-bold tracking-widest uppercase rounded-full text-white"
            [style.background]="pkg.badgeColor">
            {{ pkg.badge }}
          </span>
          <!-- Rating -->
          <div
            class="absolute top-4 right-4 flex items-center gap-1 px-2.5 py-1 rounded-full bg-black/40 backdrop-blur-sm">
            <svg class="w-3 h-3" viewBox="0 0 20 20" fill="#FFD700">
              <path
                d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
            </svg>
            <span class="text-white text-[11px] font-body font-semibold">{{ pkg.rating }}</span>
          </div>
        </div>

        <!-- Body -->
        <div class="p-6">
          <p class="text-[11px] text-gray-400 font-body tracking-widest uppercase mb-1.5">{{ pkg.locations }}</p>
          <h3 class="font-display text-xl text-gray-900 font-semibold mb-1.5 leading-tight">{{ pkg.title }}</h3>

          <!-- Meta -->
          <div class="flex items-center gap-4 text-gray-400 text-xs font-body mb-4">
            <span class="flex items-center gap-1">
              <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
              </svg>
              {{ pkg.duration }}
            </span>
            <span class="flex items-center gap-1">
              <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" />
              </svg>
              {{ pkg.group }}
            </span>
          </div>

          <!-- Inclusions Chips -->
          <div class="flex flex-wrap gap-1.5 mb-5">
            <span *ngFor="let inc of pkg.inclusions"
              class="px-2.5 py-1 rounded-full text-[10px] font-body font-medium bg-pista-50 text-pista-dark">{{ inc
              }}</span>
          </div>

          <!-- Price + CTA -->
          <div class="flex items-center justify-between pt-4 border-t border-gray-100">
            <div>
              <span class="text-[10px] text-gray-400 uppercase tracking-wide font-body">Starting from</span>
              <p class="font-body font-bold text-gray-900 text-xl leading-none mt-0.5">{{ pkg.price }}</p>
              <span class="text-[10px] text-gray-400 font-body">per person</span>
            </div>
            <a [routerLink]="['/package-detail', 'packages', pkg.id]" class="btn-pista">
              View Details
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- Bottom Banner - Visa Assistance -->
    <div class="mt-14 grid grid-cols-1 lg:grid-cols-3 gap-5">
      <div *ngFor="let service of services"
        class="flex items-center gap-4 p-5 rounded-xl border border-gray-100 hover:border-pista/30 hover:bg-pista-50/30 transition-all duration-200">
        <div class="w-11 h-11 rounded-xl flex items-center justify-center shrink-0" style="background:#f0f7ea;">
          <span [innerHTML]="service.icon | safeHtml"></span>
        </div>
        <div>
          <p class="font-body font-semibold text-gray-900 text-[0.9rem]">{{ service.title }}</p>
          <p class="text-gray-400 text-xs font-body mt-0.5">{{ service.desc }}</p>
        </div>
      </div>
    </div>

  </div>
</section>
